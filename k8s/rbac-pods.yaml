apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: iot-topology
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-pods
  namespace: iot-topology
subjects:
- kind: ServiceAccount
  name: default
  namespace: iot-topology
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
